name: CI

on:
  push:
    branches: [main]
  pull_request:

# CI only reads source and uploads coverage (codecov uses its own token).
# No GitHub API writes required.
permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit tests
        run: mvn verify -P unit-tests      - name: Upload coverage
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/site/jacoco/jacoco.xml
          flags: unit
          fail_ci_if_error: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install Aptos CLI
        env:
          APTOS_CLI_VERSION: '9.3.0'
        run: |
          npm install --no-save @aptos-labs/aptos-cli@3.0.0
          npx aptos --install

      - name: Start localnet
        run: npx aptos node run-localnet --force-restart --assume-yes > /tmp/localnet.log 2>&1 &

      - name: Wait for localnet
        run: |
          echo "Waiting for localnet readiness..."
          for i in {1..45}; do
            if curl -sf http://localhost:8070/ > /dev/null 2>&1; then
              echo "Localnet ready after ${i}x2s"
              exit 0
            fi
            echo "  attempt $i/45..."
            sleep 2
          done
          echo "Localnet failed to start. Log:"
          cat /tmp/localnet.log
          exit 1

      - name: Run integration tests
        run: mvn verify -P integration-tests      - name: Upload coverage
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/site/jacoco/jacoco.xml
          flags: integration
          fail_ci_if_error: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
